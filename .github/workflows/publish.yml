name: '🚀 Publish Kodi Addon'

permissions:
  contents: write  # Required to upload assets to GitHub Releases

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: 'Addon version (e.g. 1.2.1 or v1.2.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set version from release
        id: version
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Update addon version in addon.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update main addon version
          sed -i "s/version=\".*\"/version=\"$VERSION\"/" plugin.video.tidb/addon.xml
          # Update path in addon.xml
          sed -i "s|<path>.*</path>|<path>plugin.video.tidb-$VERSION.zip</path>|" plugin.video.tidb/addon.xml

      - name: Create addon zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd plugin.video.tidb
          zip -r "../plugin.video.tidb-$VERSION.zip" .
          cd ..

      - name: Generate addons.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Create addons.xml for repository
          cat > addons.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <addons>
          EOF
          
          # Add repository addon
          cat repository.tidb.repo/addon.xml >> addons.xml
          
          # Add main addon
          cat plugin.video.tidb/addon.xml >> addons.xml
          
          cat >> addons.xml << 'EOF'
          </addons>
          EOF

      - name: Generate MD5 checksum
        run: |
          md5sum addons.xml > addons.xml.md5

      - name: Upload addon zip
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: addon-zip
          retention-days: 30
          if-no-files-found: error
          path: plugin.video.tidb-${{ steps.version.outputs.version }}.zip

      - name: Upload repository files
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: repository-files
          retention-days: 30
          if-no-files-found: error
          path: |
            addons.xml
            addons.xml.md5

  upload:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download addon zip
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: addon-zip

      - name: Download repository files
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: repository-files

      - name: Prepare Release Assets
        run: |
          for file in ./*.zip; do
            [ -f "$file" ] || continue
            md5sum "${file#./}" >> "${file%.*}.md5"
            sha256sum "${file#./}" >> "${file%.*}.sha256"
          done
          ls -l

      - name: Upload Release Assets
        uses: shogo82148/actions-upload-release-asset@8f6863c6c894ba46f9e676ef5cccec4752723c1e # v1.9.2
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./*

      - name: Checkout repo for manifest update
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Update repository addon.xml with release info
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ github.event.release.tag_name }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/plugin.video.tidb-${VERSION}.zip"
          
          # Update repository addon.xml to point to the release
          sed -i "s|<datadir zip=\"true\">.*</datadir>|<datadir zip=\"true\">${SOURCE_URL%/*}/</datadir>|" repository.tidb.repo/addon.xml

      - name: Commit and push repository update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository.tidb.repo/addon.xml
          git diff --staged --quiet || git commit -m "chore: update repository for v${{ needs.build.outputs.version }}"
          git push