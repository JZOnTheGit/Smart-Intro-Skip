# This workflow performs an automated release to GitHub
# For TheIntroDB Kodi addon

name: Release
on:
  push:
    tags:
    - 'v*'
jobs:
  build:
    name: Release TheIntroDB Kodi Addon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build zip files
        run: |
          sudo apt-get update
          sudo apt-get install libxml2-utils
          
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Building version: $VERSION"
          
          # Update plugin addon.xml version and path
          cd plugin.video.tidb
          # Update version attribute
          sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" addon.xml
          # Update path in metadata
          sed -i "s/<path>plugin.video.tidb-[^<]*<\/path>/<path>plugin.video.tidb-$VERSION.zip<\/path>/" addon.xml
          # Add news line with version changelog and GitHub release URL
          sed -i "s/<news lang=\"en_GB\">[^<]*<\/news>/<news lang=\"en_GB\">v$VERSION — Release $VERSION with latest features and fixes. [View Release](https:\/\/github.com\/${GITHUB_REPOSITORY}\/releases\/tag\/${GITHUB_REF#refs\/tags\/})<\/news>/" addon.xml
          cd ..
          
          # Create plugin zip
          cd plugin.video.tidb
          zip -r "../plugin.video.tidb-$VERSION.zip" .
          cd ..
          
          # Create repository zip
          cd repository.tidb.repo
          zip -r "../repository.tidb.repo-$VERSION.zip" .
          cd ..
          
          # Generate addons.xml with updated versions
          cat > addons.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <addons>
          EOF
          cat repository.tidb.repo/addon.xml >> addons.xml
          cat plugin.video.tidb/addon.xml >> addons.xml
          echo '</addons>' >> addons.xml
          # Generate MD5
          md5sum addons.xml > addons.xml.md5
      - name: Get body
        id: get-body
        run: |
          # Extract release notes from README or use default
          if [ -f README.md ]; then
            description=$(sed '1,/^## Releases$/d;/## v[0-9\.]* ([0-9-]*)/d;/^$/,$d' README.md 2>/dev/null || echo "TheIntroDB Kodi addon v${GITHUB_REF#refs/tags/v}")
          else
            description="TheIntroDB Kodi addon v${GITHUB_REF#refs/tags/v}"
          fi
          echo $description
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$description" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: ${{ steps.get-body.outputs.body }}
          draft: false
          prerelease: false
          files: |
            plugin.video.tidb-*.zip
            repository.tidb.repo-*.zip
            addons.xml
            addons.xml.md5